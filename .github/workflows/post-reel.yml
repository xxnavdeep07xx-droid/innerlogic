name: Daily Instagram Reel

on:
  schedule:
    # Trigger at 5:30 PM IST = 12:00 UTC (IST = UTC+5:30)
    # The smart scheduler will calculate the best time and wait
    # This gives a window from 5:30 PM to 11 PM IST for optimal posting
    - cron: '0 12 * * *'
  
  # Allow manual trigger for testing
  workflow_dispatch:

permissions:
  contents: write  # Needed to push performance data back to repo

jobs:
  post-reel:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎬 Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: 🔤 Download fonts (Cormorant Garamond + Montserrat)
        run: |
          mkdir -p fonts
          # Cormorant Garamond — elegant serif for philosophical quotes
          wget -q "https://raw.githubusercontent.com/google/fonts/main/ofl/cormorantgaramond/CormorantGaramond%5Bwght%5D.ttf" -O "fonts/CormorantGaramond[wght].ttf" || true
          wget -q "https://raw.githubusercontent.com/google/fonts/main/ofl/cormorantgaramond/CormorantGaramond-Italic%5Bwght%5D.ttf" -O "fonts/CormorantGaramond-Italic[wght].ttf" || true
          # Montserrat — clean sans-serif for author attribution
          wget -q "https://raw.githubusercontent.com/google/fonts/main/ofl/montserrat/Montserrat%5Bwght%5D.ttf" -O "fonts/Montserrat[wght].ttf" || true
          wget -q "https://raw.githubusercontent.com/google/fonts/main/ofl/montserrat/Montserrat-Italic%5Bwght%5D.ttf" -O "fonts/Montserrat-Italic[wght].ttf" || true
          echo "Fonts downloaded"
          ls -la fonts/

      - name: 🚀 Run reel automation
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          INSTAGRAM_TOTP_SECRET: ${{ secrets.INSTAGRAM_TOTP_SECRET }}
          INSTAGRAM_SESSION: ${{ secrets.INSTAGRAM_SESSION }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          # Pixabay API key (optional — adds thousands of music tracks)
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          # Smart scheduling ON for cron, OFF for manual triggers (post immediately)
          SMART_SCHEDULING: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
        run: |
          python3 src/main.py

      - name: 💾 Save performance & music data
        if: always()
        run: |
          git config --global user.name "InnerLogic Bot"
          git config --global user.email "bot@innerlogic.dev"
          if [ -f data/post_performance.json ]; then
            git add data/post_performance.json
            echo "Performance data staged"
          fi
          if [ -f data/music_history.json ]; then
            git add data/music_history.json
            echo "Music history staged"
          fi
          git diff --cached --quiet || git commit -m "📊 Update performance & music data"
          git push
          echo "Data saved"

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -rf temp/
