name: Daily Instagram Reel

on:
  schedule:
    # Run at 8:00 PM IST = 14:30 UTC (IST = UTC+5:30)
    - cron: '30 14 * * *'
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  post-reel:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎬 Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: 🔤 Download fonts
        run: |
          mkdir -p fonts
          # Download Playfair Display (elegant serif font)
          wget -q "https://github.com/google/fonts/raw/main/ofl/playfairdisplay/PlayfairDisplay%5Bwght%5D.ttf" -O fonts/PlayfairDisplay-Regular.ttf 2>/dev/null || true
          wget -q "https://github.com/google/fonts/raw/main/ofl/playfairdisplay/PlayfairDisplay-Italic%5Bwght%5D.ttf" -O fonts/PlayfairDisplay-Italic.ttf 2>/dev/null || true
          # If downloads fail, we'll use system fonts
          echo "Font files prepared"

      - name: 🔄 Refresh access token
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
        run: |
          # First, exchange for a long-lived token
          python3 -c "
          from src.token_refresh import exchange_for_long_lived_token
          import os
          token = os.environ['INSTAGRAM_ACCESS_TOKEN']
          app_id = os.environ['FACEBOOK_APP_ID']
          app_secret = os.environ['FACEBOOK_APP_SECRET']
          try:
              new_token = exchange_for_long_lived_token(token, app_id, app_secret)
              # Save to file for the next step
              with open('temp_token.txt', 'w') as f:
                  f.write(new_token)
              print('Token refreshed successfully!')
          except Exception as e:
              print(f'Token refresh failed: {e}')
              with open('temp_token.txt', 'w') as f:
                  f.write(token)
              print('Using existing token')
          "

      - name: 🚀 Run reel automation
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          # Use refreshed token if available
          if [ -f temp_token.txt ]; then
            export INSTAGRAM_ACCESS_TOKEN=$(cat temp_token.txt)
          fi
          python3 src/main.py

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -f temp_token.txt
          rm -rf temp/
